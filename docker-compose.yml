name: "ghostland-grh"

services:
  minecraft:
    image: "itzg/minecraft-server:java21-graalvm"
    tty: true
    stdin_open: true
    network_mode: "host"
    volumes:
      - "./minecraft/GCM:/data"
      - "./builds:/modpacks:ro"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc-health"]
      start_period: 210s
      interval: 3s
      retries: 40
    secrets:
      - db_host
      - db_port
      - db_name
      - db_user
      - db_password
      - db_table_accounts_ingame
      - bot_poltergeist
      - seed
    depends_on:
      #ci:
        #condition: service_healthy
      db:
        condition: service_started
    environment:
      # Modpack
      TYPE: "MODRINTH"
      MODRINTH_MODPACK: "/modpacks/CraftMine 1.2.0 - Server Edition.mrpack"
      # Minecraft stuff
      GUI: "FALSE"
      EULA: "TRUE"
      PORT: "25565"
      # Java stuff
      MEMORY: "18G"
      USE_AIKAR_FLAGS: "true"
      # Secrets
      CFG_DB_HOST_FILE: "/run/secrets/db_host"
      CFG_DB_PORT_FILE: "/run/secrets/db_port"
      CFG_DB_NAME_FILE: "/run/secrets/db_name"
      CFG_DB_TABLE_FILE: "/run/secrets/db_table_accounts_ingame"
      CFG_DB_USER_FILE: "/run/secrets/db_user"
      CFG_DB_PASS_FILE: "/run/secrets/db_password"
      CFG_BOT_TOKEN_FILE: "/run/secrets/bot_poltergeist"
      CFG_SEED_FILE: "/run/secrets/seed"
      # Secrets injection
      REPLACE_ENV_VARIABLES: "TRUE"
      ENV_VARIABLE_PREFIX: "CFG_"
      REPLACE_ENV_IN_PLACE: "true"
      REPLACE_ENV_DURING_SYNC: "true"
      # Misc
      UID: "42069"
      GID: "121"
      TZ: "Europe/Warsaw"
      LOG_TIMESTAMP: "true"
      LEVEL: "world"
      DATAPACKS: "datapacks/"

  #ci:
    #build: "https://github.com/Team-GhostLand/Grinch.git"
    #network_mode: "host"
    #volumes:
      #- "./builds:/exports"
    #restart: unless-stopped
    #healthcheck:
      #test: ["CMD-SHELL", "test -e /exports/latest_server.mrpack"]
      #start_period: 120s
      #interval: 1s
      #retries: 2
      #timeout: 1s
    #environment:
      #REPO: https://github.com/Team-GhostLand/grun.git
      #PACK: GhostRunHardcore

  bot-account:
    build: "https://github.com/Team-GhostLand/Poltergeist.git"
    restart: unless-stopped
    network_mode: "host"
    volumes:
      - "./bots/account:/usr/src/app/data"
      - "./minecraft/ghostrun/world.older/stats:/usr/src/app/data/statdirs/GhostRun:ro"
      - "./minecraft/ghostrun/world/stats:/usr/src/app/data/statdirs/Ghostland7.5_GhostRun:ro"
      - "./minecraft/GL7/world/stats:/usr/src/app/data/statdirs/Ghostland7:ro"
      - "./minecraft/craftmine/world/stats:/usr/src/app/data/statdirs/Craftmine:ro"
      - "./minecraft/GRH/world/stats:/usr/src/app/data/statdirs/GRH:ro"
      - "./minecraft/GCM/world/stats:/usr/src/app/data/statdirs/GCM:ro"
    depends_on:
      db:
        condition: service_started
    secrets:
      - db_host
      - db_port
      - db_name
      - db_user
      - db_password
      - bot_account
      - bot_account_id
      - bot_account_hook
    user: "42069:121"

  db:
    image: mysql:9-oracle
    restart: unless-stopped
    network_mode: "host"
    secrets:
      - db_name
      - db_root
      - db_user
      - db_password
    volumes:
      - "./db/data:/var/lib/mysql"
      - "./db/config:/etc"
    environment:
      MYSQL_DATABASE_FILE: "/run/secrets/db_name"
      MYSQL_ROOT_PASSWORD_FILE: "/run/secrets/db_root"
      MYSQL_USER_FILE: "/run/secrets/db_user"
      MYSQL_PASSWORD_FILE: "/run/secrets/db_password"
    user: "42069:121"

secrets:
  db_host:
    file: ./secrets/db/host.txt
  db_port:
    file: ./secrets/db/port.txt
  db_name:
    file: ./secrets/db/name.txt
  db_root:
    file: ./secrets/db/accounts/root_pass.txt
  db_user:
    file: ./secrets/db/accounts/user.txt
  db_password:
    file: ./secrets/db/accounts/user_pass.txt
  db_table_accounts_ingame:
    file: ./secrets/db/tables/accounts_ingame.txt
  bot_poltergeist:
    file: ./secrets/bot_tokens/poltergeist.txt
  bot_account:
    file: ./secrets/bot_tokens/account.txt
  bot_account_id:
    file: ./secrets/bot_tokens/account_id.txt
  bot_account_hook:
    file: ./secrets/bot_tokens/account_hook.txt
  seed:
    file: ./secrets/seed.txt
